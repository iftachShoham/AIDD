defaults:
  - _self_
  - model: small #small medium
  # - override hydra/launcher: submitit_slurm  # Uncomment for Slurm clusters

ngpus: 1
tokens: 4095

training:
  batch_size: 128
  accum: 1
  n_iters: 1300001
  snapshot_freq: 50000
  log_freq: 100
  eval_freq: 500
  patience: 500000
  snapshot_freq_for_preemption: 50000
  weight: standard
  snapshot_sampling: True
  ema: 0.9999
  lamda: 500.0
  p_base: 0.8
  alpha: 0.5

data:
  train: MusicNet
  valid: MusicNet
  dataset: MusicNet
  cache_dir: data

graph:
  type: absorb
  file: data
  report_all: False

noise:
  type: loglinear
  sigma_min: 1e-4
  sigma_max: 20

sampling:
  predictor: euler
  steps: 128
  noise_removal: True

eval:
  batch_size: 128
  perplexity: True
  perplexity_batch_size: 2

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 1e-6
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  warmup: 2500
  grad_clip: 1.

model:
  tokenizer: wavtokenizer #wavtokenizer, unicodec

hydra:
  run:

    dir: /path/to/output/${data.dataset}/${now:%Y.%m.%d}/${now:%H%M%S}
  sweep:
    dir: /path/to/output/${data.dataset}/${now:%Y.%m.%d}/${now:%H%M%S}
    subdir: ${hydra.job.num}
